---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
      {{ page.date | date: "%B %d, %Y" }}
    </time>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
